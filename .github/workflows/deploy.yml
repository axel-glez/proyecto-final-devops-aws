name: CI/CD Pipeline DevOps AWS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Flask App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Validate Flask import
        run: |
          cd docker
          python -c "from app import app; print('Flask app importada correctamente')"

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Create deployment package
        run: |
          zip -r mi-app.zip docker/ template.yaml automatizacion.py setup.sh usuarios.sh limpieza_logs.sh

      - name: Upload artifact to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws s3 cp mi-app.zip s3://mi-pipeline-source-$ACCOUNT_ID/mi-app.zip

      - name: Deploy command through SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running" "Name=tag:Name,Values=devops-cf-ec2" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Instancia encontrada: $INSTANCE_ID"

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No se encontró instancia devops-cf-ec2 en ejecución. Se omite despliegue por SSM."
            exit 0
          fi

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Despliegue automatizado desde GitHub Actions" \
            --parameters 'commands=[
              "echo Despliegue recibido desde GitHub Actions",
              "aws s3 cp s3://mi-pipeline-source-'$(aws sts get-caller-identity --query Account --output text)'/mi-app.zip /tmp/mi-app.zip",
              "ls -lh /tmp/mi-app.zip"
            ]' \
            --region us-east-1
